name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Run example scripts
        run: |
          python examples/run_detector_sweep.py --output-dir /tmp/detector_sweep
          python examples/run_laser_pid_demo.py --output-dir /tmp/laser_pid
